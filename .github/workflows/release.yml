name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Extract the section between the version header and the next header
          # Handles both "## vX.Y.Z" and "## X.Y.Z" formats, plus "## Unreleased" for pre-1.0
          VERSION="${{ steps.version.outputs.version }}"

          # Try exact version match first, fall back to Unreleased section
          NOTES=$(awk -v ver="$VERSION" '
            /^## / {
              if (found) exit
              if ($0 ~ ver || $0 ~ "Unreleased") found=1
              next
            }
            found { print }
          ' CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            NOTES="Release ${{ github.ref_name }}"
          fi

          # Write to file to preserve newlines
          echo "$NOTES" > /tmp/release_notes.md

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v2
        with:
          python-version: "3.13"

      - name: Build package
        run: uv build

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/release_notes.md \
            dist/*
