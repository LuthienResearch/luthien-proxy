name: Dev Checks

on:
  push:
    branches:
      - main
      - objective/**
  pull_request:

jobs:
  dev-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: luthien
      PGPASSWORD: luthien
      PGDATABASE: luthien_control
      LITELLM_DATABASE_URL: postgresql://luthien:luthien@localhost:5432/litellm_db
    services:
      postgres:
        image: postgres:16-alpine
        env:
          # Note: Cannot use job-level env vars here - services are created before job env is available
          POSTGRES_USER: luthien
          POSTGRES_PASSWORD: luthien
          POSTGRES_DB: luthien_control
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U luthien" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Sync project dependencies
        run: uv sync --all-groups --locked

      - name: Prepare databases
        run: |
          until pg_isready; do
            echo "Waiting for Postgres..."
            sleep 1
          done
          psql -d postgres -tc "SELECT 1 FROM pg_database WHERE datname='litellm_db';" | grep -q 1 || \
            psql -d postgres -c "CREATE DATABASE litellm_db;"

      - name: Run SQL migrations
        run: MIGRATIONS_DIR=./migrations ./docker/run-migrations.sh

      - name: Verify schema
        run: |
          echo "🔍 Verifying database schema..."
          psql -c "SELECT 1 FROM _migrations LIMIT 0;"
          psql -c "SELECT 1 FROM current_policy LIMIT 0;"
          psql -c "SELECT 1 FROM conversation_events LIMIT 0;"
          psql -c "SELECT 1 FROM conversation_calls LIMIT 0;"
          psql -c "SELECT 1 FROM debug_logs LIMIT 0;"
          echo "✅ Schema verification passed"

      - name: Run formatting, lint, and tests
        run: ./scripts/dev_checks.sh

      - name: Ensure working tree is clean
        run: git diff --exit-code

  mock-e2e:
    name: Mock E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Sync project dependencies
        run: uv sync --all-groups --locked

      - name: Start gateway (SQLite, mock Anthropic backend)
        run: |
          UV_NO_ENV_FILE=1 \
          ANTHROPIC_BASE_URL=http://localhost:18888 \
          ANTHROPIC_API_KEY=mock-key \
          PROXY_API_KEY=sk-luthien-dev-key \
          ADMIN_API_KEY=admin-dev-key \
          OTEL_ENABLED=false \
          ENABLE_REQUEST_LOGGING=true \
          MOCK_ANTHROPIC_HOST=localhost \
          PYTHONPATH=src \
          uv run python -m luthien_proxy.main --local > /tmp/gateway.log 2>&1 &
          echo $! > /tmp/gateway.pid

      - name: Wait for gateway to be healthy
        run: |
          timeout 30 bash -c 'until curl -sf http://localhost:8000/health; do sleep 1; done' \
            || { echo "Gateway failed to start:"; cat /tmp/gateway.log; exit 1; }

      - name: Run mock_e2e tests
        run: |
          uv run pytest -m mock_e2e tests/e2e_tests/ \
            --timeout=120 --no-cov -v

      - name: Show gateway logs on failure
        if: failure()
        run: cat /tmp/gateway.log

      - name: Stop gateway
        if: always()
        run: kill "$(cat /tmp/gateway.pid)" 2>/dev/null || true
