# docker-compose override for mock-based e2e testing (Linux).
#
# Redirects the gateway's Anthropic backend to a mock server running on
# the host machine at port 18888 (tests/luthien_proxy/e2e_tests/mock_anthropic/server.py).
#
# Uses network_mode: host so the gateway container shares the host's network
# namespace and can reach the mock server on 127.0.0.1. This also requires
# overriding DB/Redis URLs to use 127.0.0.1 (Docker service names don't
# resolve under host networking).
#
# Usage:
#   docker compose -f docker-compose.yaml -f docker-compose.mock.yaml up -d
#   uv run pytest -m mock_e2e tests/luthien_proxy/e2e_tests/test_mock_*.py -v

services:
  gateway:
    extra_hosts:
      - "host.docker.internal:127.0.0.1"
    environment:
      - ANTHROPIC_BASE_URL=http://127.0.0.1:18888
      - ANTHROPIC_API_KEY=mock-key
      - LLM_JUDGE_API_BASE=http://127.0.0.1:18888
      - DATABASE_URL=postgresql://luthien:luthien_dev_password@127.0.0.1:5433/luthien_control
      - REDIS_URL=redis://127.0.0.1:6379
    network_mode: host
