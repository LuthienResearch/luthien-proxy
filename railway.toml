# Railway deployment configuration for Luthien Proxy
# Deploy: https://railway.app/new/template?template=https://github.com/luthienresearch/luthien-proxy
#
# The app boots with sensible defaults (SQLite, auto-generated API key) so a
# fresh deploy works without any manual env var configuration. For production
# use, add a Postgres service and set PROXY_API_KEY to a stable value.

[build]
dockerfilePath = "docker/Dockerfile.gateway"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Optional environment variables (set in Railway dashboard for production):
# DATABASE_URL - Auto-populated when adding PostgreSQL (defaults to SQLite)
# PROXY_API_KEY - Stable API key for clients (auto-generated if not set)
# ADMIN_API_KEY - API key for admin endpoints
# REDIS_URL - Auto-populated when adding Redis (optional, enables real-time UI)
# OPENAI_API_KEY - OpenAI API key (if using)
# ANTHROPIC_API_KEY - Anthropic API key (if using)
# GATEWAY_PORT - Auto-detected from Railway's PORT (no manual config needed)
