# Railway deployment configuration for Luthien Proxy
# Deploy: https://railway.app/new/template?template=https://github.com/luthienresearch/luthien-proxy
#
# One-click deploy: the app detects Railway and boots with sensible defaults:
#   - SQLite database (no Postgres needed for single-user)
#   - AUTH_MODE=passthrough (OAuth pass-through, no API key needed)
#   - Default policy: debug logging + English language safety rules
#   - Auto-generated admin API key
#
# After deploying, generate a domain (Settings → Networking → Generate Domain),
# then point Claude Code at your proxy:
#   export ANTHROPIC_BASE_URL=https://your-app.railway.app
#
# For production use, add a Postgres service and set CLIENT_API_KEY to a stable value.
# Set a Railway usage limit ($5-20/month) as a budget safety valve.

[build]
dockerfilePath = "docker/Dockerfile.gateway"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Optional environment variables (set in Railway dashboard to override defaults):
# AUTH_MODE - Defaults to "passthrough" on Railway (OAuth pass-through)
# DATABASE_URL - Add PostgreSQL service for multi-user (defaults to SQLite)
# CLIENT_API_KEY - Set for client_key auth mode (not needed for passthrough)
# ADMIN_API_KEY - Admin endpoints (auto-generated if not set)
# REDIS_URL - Add Redis for real-time UI events (optional)
# POLICY_CONFIG - Path to policy YAML (defaults to config/railway_policy_config.yaml)
# ANTHROPIC_API_KEY - Only needed for client_key auth mode, not passthrough
# GATEWAY_PORT - Auto-detected from Railway's PORT (no manual config needed)
