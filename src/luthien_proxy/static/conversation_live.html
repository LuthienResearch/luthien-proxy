<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Conversation View</title>
    <link rel="stylesheet" href="/static/nav.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #09090b;
            color: #e4e4e7;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid #27272a;
        }

        .header-left { flex: 1; }

        .back-link {
            color: #71717a;
            text-decoration: none;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 12px;
            transition: color 0.2s;
        }

        .back-link:hover { color: #a1a1aa; }

        h1 {
            font-size: 22px;
            font-weight: 700;
            color: #fafafa;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: #4ade80;
            background: #4ade8015;
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid #4ade8030;
        }

        .live-dot {
            width: 7px;
            height: 7px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        .live-badge.paused {
            color: #71717a;
            background: #71717a15;
            border-color: #71717a30;
        }

        .live-badge.paused .live-dot {
            background: #71717a;
            animation: none;
        }

        .live-badge.reconnecting {
            color: #fbbf24;
            background: #fbbf2415;
            border-color: #fbbf2430;
        }

        .live-badge.reconnecting .live-dot {
            background: #fbbf24;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 #4ade8060; }
            50% { opacity: 0.6; box-shadow: 0 0 0 4px #4ade8000; }
        }

        .session-id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #52525b;
            margin-top: 6px;
            word-break: break-all;
        }

        .header-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .header-btn {
            padding: 7px 14px;
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 6px;
            color: #a1a1aa;
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .header-btn:hover {
            border-color: #3f3f46;
            color: #e4e4e7;
            background: #1c1c1f;
        }

        /* Stats bar */
        .stats-bar {
            display: flex;
            gap: 20px;
            padding: 14px 18px;
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 13px;
            color: #71717a;
            flex-wrap: wrap;
        }

        .stat-value {
            color: #e4e4e7;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .stat-value.warning { color: #fbbf24; }

        /* Connection indicator */
        .connection-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0 8px;
        }

        .connection-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4ade80;
        }

        .connection-dot.reconnecting {
            background: #fbbf24;
            animation: pulse 1s ease-in-out infinite;
        }

        .connection-dot.offline {
            background: #71717a;
        }

        .connection-text {
            font-size: 11px;
            color: #71717a;
        }

        /* Conversation timeline */
        .timeline {
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
        }

        /* Turn card */
        .turn {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 10px;
            overflow: hidden;
            transition: border-color 0.3s;
        }

        .turn.has-intervention {
            border-color: #fbbf2440;
        }

        .turn.new-turn {
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .turn-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: #1c1c1f;
            border-bottom: 1px solid #27272a;
            font-size: 12px;
            color: #71717a;
        }

        .turn-label {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .turn-number {
            font-weight: 700;
            color: #e4e4e7;
            font-size: 13px;
        }

        .turn-model {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            padding: 2px 8px;
            background: #09090b;
            border-radius: 4px;
            color: #71717a;
        }

        .intervention-badge {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #fbbf24;
            background: #fbbf2415;
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid #fbbf2430;
        }

        .turn-body {
            padding: 16px;
        }

        /* Messages */
        .messages {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            position: relative;
            border-left: 3px solid transparent;
        }

        .message.system  { background: #13132a; border-left-color: #6366f1; }
        .message.user    { background: #0f1f0f; border-left-color: #4ade80; }
        .message.assistant { background: #0f1420; border-left-color: #3b82f6; }
        .message.tool_call { background: #1a1708; border-left-color: #fbbf24; }
        .message.tool_result { background: #0a1a1a; border-left-color: #06b6d4; }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }

        .message-type {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .message.system .message-type  { color: #818cf8; }
        .message.user .message-type    { color: #4ade80; }
        .message.assistant .message-type { color: #60a5fa; }
        .message.tool_call .message-type { color: #fbbf24; }
        .message.tool_result .message-type { color: #22d3ee; }

        .tool-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #fbbf24;
            background: #fbbf2410;
            padding: 1px 7px;
            border-radius: 3px;
        }

        .tool-call-id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: #52525b;
        }

        .message-content {
            font-size: 14px;
            color: #d4d4d8;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message-content.truncated {
            max-height: 280px;
            overflow: hidden;
            position: relative;
        }

        .message-content.truncated::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: linear-gradient(transparent, #18181b);
            pointer-events: none;
        }

        .message-content.truncated.expanded {
            max-height: none;
            overflow: visible;
        }

        .message-content.truncated.expanded::after {
            display: none;
        }

        .expand-btn {
            display: inline-block;
            margin-top: 6px;
            padding: 3px 10px;
            background: transparent;
            border: 1px solid #27272a;
            border-radius: 4px;
            color: #71717a;
            font-size: 11px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
        }

        .expand-btn:hover {
            border-color: #4ade80;
            color: #4ade80;
        }

        .tool-input {
            margin-top: 8px;
            padding: 10px 12px;
            background: #09090b;
            border-radius: 6px;
            border: 1px solid #27272a;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #a1a1aa;
            overflow-x: auto;
        }

        /* Event timeline */
        .event-timeline {
            margin-top: 16px;
            border-top: 1px solid #27272a;
            padding-top: 12px;
        }

        .event-timeline-toggle {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: #3f3f4615;
            border: 1px solid #3f3f4630;
            border-radius: 6px;
            color: #a1a1aa;
            font-size: 11px;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 8px;
        }

        .event-timeline-toggle:hover {
            background: #3f3f4625;
            border-color: #3f3f4650;
        }

        .event-timeline-toggle .arrow {
            transition: transform 0.2s;
            font-size: 9px;
        }

        .event-timeline-toggle.open .arrow {
            transform: rotate(90deg);
        }

        .event-list {
            display: none;
            max-height: 400px;
            overflow-y: auto;
            border-left: 2px solid #27272a;
            padding-left: 12px;
            margin-left: 6px;
        }

        .event-list.visible {
            display: block;
        }

        .event-item {
            font-size: 12px;
            color: #a1a1aa;
            padding: 8px 0;
            border-bottom: 1px solid #27272a;
            position: relative;
            padding-left: 12px;
        }

        .event-item::before {
            content: '';
            position: absolute;
            left: -8px;
            top: 12px;
            width: 6px;
            height: 6px;
            background: #3f3f46;
            border-radius: 50%;
        }

        .event-item:last-child {
            border-bottom: none;
        }

        .event-timestamp {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: #52525b;
            margin-right: 8px;
        }

        .event-type {
            font-weight: 600;
            color: #e4e4e7;
        }

        .event-raw-toggle {
            display: inline-block;
            margin-left: 8px;
            padding: 2px 6px;
            background: transparent;
            border: 1px solid #27272a;
            border-radius: 3px;
            color: #52525b;
            font-size: 9px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
        }

        .event-raw-toggle:hover {
            border-color: #3f3f46;
            color: #71717a;
        }

        .event-raw-data {
            display: none;
            margin-top: 6px;
            padding: 8px 10px;
            background: #09090b;
            border: 1px solid #27272a;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #71717a;
            overflow-x: auto;
            max-height: 200px;
            overflow-y: auto;
        }

        .event-raw-data.visible {
            display: block;
        }

        /* Policy event cards */
        .policy-event {
            margin-top: 12px;
            padding: 10px 12px;
            background: #fbbf2408;
            border: 1px solid #fbbf2420;
            border-left: 3px solid #fbbf24;
            border-radius: 6px;
            font-size: 12px;
            color: #fbbf24;
        }

        .policy-event-label {
            font-weight: 700;
            margin-right: 4px;
        }

        /* Diff view */
        .diff-section {
            margin-top: 16px;
            border-top: 1px solid #27272a;
            padding-top: 16px;
        }

        .diff-toggle {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: #fbbf2410;
            border: 1px solid #fbbf2430;
            border-radius: 6px;
            color: #fbbf24;
            font-size: 12px;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 12px;
        }

        .diff-toggle:hover {
            background: #fbbf2420;
            border-color: #fbbf2450;
        }

        .diff-toggle .arrow {
            transition: transform 0.2s;
            font-size: 10px;
        }

        .diff-toggle.open .arrow {
            transform: rotate(90deg);
        }

        .diff-panels {
            display: none;
        }

        .diff-panels.visible {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .diff-panel {
            background: #09090b;
            border: 1px solid #27272a;
            border-radius: 8px;
            overflow: hidden;
        }

        .diff-panel-header {
            padding: 8px 14px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #27272a;
        }

        .diff-panel-header.original {
            color: #f87171;
            background: #f8717108;
        }

        .diff-panel-header.final {
            color: #4ade80;
            background: #4ade8008;
        }

        .diff-panel-body {
            padding: 12px;
            max-height: 500px;
            overflow-y: auto;
        }

        .diff-message {
            padding: 8px 10px;
            margin-bottom: 8px;
            border-radius: 4px;
            background: #18181b;
            border-left: 2px solid #3f3f46;
        }

        .diff-message.changed {
            border-left-color: #fbbf24;
            background: #fbbf2408;
        }

        .diff-message-role {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #52525b;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .diff-message-content {
            font-size: 13px;
            color: #a1a1aa;
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* States */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #52525b;
            font-size: 14px;
        }

        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: #71717a;
            font-size: 14px;
        }

        .loading-state .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #27272a;
            border-top-color: #4ade80;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-state {
            text-align: center;
            padding: 40px;
            color: #f87171;
            background: #f8717108;
            border: 1px solid #f8717120;
            border-radius: 8px;
            font-size: 14px;
        }

        /* Last-updated indicator */
        .update-indicator {
            font-size: 11px;
            color: #52525b;
            text-align: right;
            margin-top: 12px;
            font-variant-numeric: tabular-nums;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .diff-panels.visible {
                grid-template-columns: 1fr;
            }
            .stats-bar {
                gap: 12px;
            }
        }
    </style>
</head>
<body>
    <nav x-data="luthienNav" class="luthien-nav">
        <a href="/" class="nav-brand">Luthien</a>
        <div class="nav-right">
            <template x-for="link in links" :key="link.href">
                <a :href="link.href" class="nav-link" :class="{ active: isActive(link.href) }" x-text="link.label"></a>
            </template>
            <template x-if="isAuthenticated()">
                <a href="/auth/logout" class="nav-signout">Sign Out</a>
            </template>
        </div>
    </nav>

    <div class="container" x-data="conversationViewer()">
        <header>
            <div class="header-left">
                <a href="/history" class="back-link">← Sessions</a>
                <h1>
                    Conversation
                    <span class="live-badge" :class="{ paused: !autoScroll, reconnecting: connection === 'reconnecting' }">
                        <span class="live-dot"></span>
                        <span x-text="autoScroll && connection === 'connected' ? 'Live' : (autoScroll ? 'Connecting...' : 'Paused')"></span>
                    </span>
                </h1>
                <p class="session-id" x-text="conversationId || 'Loading...'"></p>
            </div>
            <div class="header-right">
                <button @click="toggleAutoScroll()" class="header-btn" x-text="autoScroll ? 'Pause' : 'Resume'"></button>
                <a :href="`/api/history/sessions/${encodeURIComponent(conversationId)}/export/jsonl`" class="header-btn">Export JSONL</a>
                <a :href="`/api/history/sessions/${encodeURIComponent(conversationId)}/export`" class="header-btn">Export MD</a>
            </div>
        </header>

        <div class="stats-bar">
            <span>Turns: <span class="stat-value" x-text="stats.turns"></span></span>
            <span>Policy interventions: <span class="stat-value" :class="{ warning: stats.interventions > 0 }" x-text="stats.interventions"></span></span>
            <span>Models: <span class="stat-value" x-text="stats.models.join(', ') || 'None'"></span></span>
            <span>Events: <span class="stat-value" x-text="stats.events"></span></span>
            <div class="connection-status">
                <span class="connection-dot" :class="{ reconnecting: connection === 'reconnecting', offline: connection === 'paused' }"></span>
                <span class="connection-text" x-text="connectionText()"></span>
            </div>
        </div>

        <div id="conversation-container" class="timeline">
            <div class="loading-state">
                <div class="spinner"></div>
                <div>Loading conversation...</div>
            </div>
        </div>

        <div class="update-indicator" x-text="lastUpdated"></div>
    </div>

    <script defer src="/static/vendor/alpine.min.js"></script>
    <script src="/static/nav.js"></script>

    <script>
        function conversationViewer() {
            return {
                conversationId: '',
                turns: [],
                rawEvents: {},
                stats: { turns: 0, interventions: 0, models: [], events: 0 },
                connection: 'connecting',
                autoScroll: true,
                lastUpdated: '',
                evtSource: null,
                pollTimer: null,
                refreshTimer: null,
                expandedRaw: {},
                expandedContent: {},
                expandedDiffs: {},
                renderedCallIds: new Set(),
                turnFingerprints: {},

                init() {
                    const pathParts = window.location.pathname.split('/');
                    this.conversationId = decodeURIComponent(pathParts[pathParts.length - 1]);
                    this.setupEventDelegation();
                    this.loadInitial();
                    this.connectSSE();
                },

                setupEventDelegation() {
                    const container = document.getElementById('conversation-container');
                    container.addEventListener('click', (e) => {
                        const target = e.target.closest('[data-event-timeline]');
                        if (target) {
                            const callId = target.getAttribute('data-event-timeline');
                            const list = target.parentElement.querySelector('.event-list');
                            if (list) {
                                list.classList.toggle('visible');
                                target.classList.toggle('open');
                            }
                            return;
                        }

                        const diffBtn = e.target.closest('[data-diff-toggle]');
                        if (diffBtn) {
                            const diffId = diffBtn.getAttribute('data-diff-toggle');
                            const panel = document.getElementById(diffId);
                            if (panel) {
                                panel.classList.toggle('visible');
                                diffBtn.classList.toggle('open');
                            }
                            return;
                        }

                        const expandBtn = e.target.closest('[data-expand-btn]');
                        if (expandBtn) {
                            const contentId = expandBtn.getAttribute('data-expand-btn');
                            const el = document.getElementById(contentId);
                            if (el) {
                                const expanded = el.classList.contains('expanded');
                                el.classList.toggle('expanded');
                                expandBtn.textContent = expanded ? 'Show more' : 'Show less';
                            }
                            return;
                        }

                        const rawBtn = e.target.closest('[data-toggle-raw]');
                        if (rawBtn) {
                            const eventKey = rawBtn.getAttribute('data-toggle-raw');
                            const el = document.getElementById(`raw-${eventKey}`);
                            if (el) {
                                el.classList.toggle('visible');
                                rawBtn.textContent = el.classList.contains('visible') ? 'Hide' : 'Raw';
                            }
                            return;
                        }
                    });
                },

                async loadInitial() {
                    try {
                        const resp = await fetch(
                            `/api/history/sessions/${encodeURIComponent(this.conversationId)}`,
                            { headers: { 'Accept': 'application/json' } }
                        );

                        if (!resp.ok) {
                            if (resp.status === 403) {
                                window.location.href = '/login?error=required&next=' +
                                    encodeURIComponent(window.location.pathname);
                                return;
                            }
                            if (resp.status === 404) throw new Error('Conversation not found');
                            throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
                        }

                        const data = await resp.json();
                        this.processTurns(data);
                        this.updateStats(data);
                        this.updateTimestamp();
                        this.renderTurns();
                        this.$nextTick(() => this.autoScrollToBottom());
                    } catch (err) {
                        this.showError(`Failed to load: ${err.message}`);
                    }
                },

                connectSSE() {
                    if (this.evtSource) {
                        this.evtSource.close();
                    }

                    try {
                        this.evtSource = new EventSource('/api/activity/stream');

                        this.evtSource.onopen = () => {
                            this.connection = 'connected';
                        };

                        this.evtSource.onmessage = (evt) => {
                            try {
                                const data = JSON.parse(evt.data);
                                const eventSessionId = data.data?.session_id || data.session_id;
                                if (eventSessionId === this.conversationId) {
                                    this.handleSSEEvent(data);
                                }
                            } catch (e) {
                                console.error('Failed to parse SSE event:', e);
                            }
                        };

                        this.evtSource.onerror = () => {
                            this.connection = 'reconnecting';
                            if (this.evtSource.readyState === EventSource.CLOSED) {
                                this.evtSource.close();
                                setTimeout(() => this.connectSSE(), 3000);
                            }
                        };
                    } catch (err) {
                        console.error('Failed to connect SSE:', err);
                        this.connection = 'reconnecting';
                        setTimeout(() => this.connectSSE(), 3000);
                    }
                },

                handleSSEEvent(event) {
                    if (!event.event_type) return;

                    const eventType = event.event_type.toLowerCase();
                    const callId = event.call_id || event.id;

                    if (!this.rawEvents[callId]) {
                        this.rawEvents[callId] = [];
                    }

                    this.rawEvents[callId].push({
                        type: eventType,
                        timestamp: event.timestamp || new Date().toISOString(),
                        data: event
                    });

                    this.stats.events++;

                    const shouldRefresh = eventType.includes('request_recorded') ||
                                        eventType.includes('response_recorded') ||
                                        eventType.includes('policy.');

                    if (shouldRefresh) {
                        this.debouncedRefresh();
                    }
                },

                debouncedRefresh() {
                    if (this.refreshTimer) clearTimeout(this.refreshTimer);
                    this.refreshTimer = setTimeout(() => this.refreshTurns(), 1000);
                },

                async refreshTurns() {
                    try {
                        const resp = await fetch(
                            `/api/history/sessions/${encodeURIComponent(this.conversationId)}`,
                            { headers: { 'Accept': 'application/json' } }
                        );
                        if (!resp.ok) return;
                        const data = await resp.json();
                        const newTurns = data.turns || [];

                        this.updateStats(data);
                        this.updateTimestamp();

                        const container = document.getElementById('conversation-container');

                        // Remove empty/loading state if present
                        const emptyState = container.querySelector('.empty-state, .loading-state');
                        if (emptyState) emptyState.remove();

                        const savedState = this.snapshotExpandState();

                        // Update existing turns only if their data changed
                        // (e.g. response arrived, late policy annotation)
                        for (let i = 0; i < newTurns.length; i++) {
                            const turn = newTurns[i];
                            const fp = JSON.stringify(turn);
                            if (this.renderedCallIds.has(turn.call_id)) {
                                if (fp !== this.turnFingerprints[turn.call_id]) {
                                    const existing = container.querySelector(`[data-call-id="${CSS.escape(turn.call_id)}"]`);
                                    if (existing) {
                                        existing.outerHTML = this.renderTurn(turn, i + 1);
                                    }
                                    this.turnFingerprints[turn.call_id] = fp;
                                }
                            } else {
                                // New turn — append
                                this.renderedCallIds.add(turn.call_id);
                                this.turnFingerprints[turn.call_id] = fp;
                                const html = this.renderTurn(turn, i + 1);
                                container.insertAdjacentHTML('beforeend', html);
                                const newEl = container.lastElementChild;
                                if (newEl) newEl.classList.add('new-turn');
                            }
                        }

                        this.restoreExpandState(savedState);
                        this.turns = newTurns;
                        this.autoScrollToBottom();
                    } catch (err) {
                        console.error('Failed to refresh turns:', err);
                    }
                },

                processTurns(data) {
                    this.turns = data.turns || [];
                },

                updateStats(data) {
                    this.stats.turns = data.turns?.length || 0;
                    this.stats.interventions = data.total_policy_interventions || 0;
                    this.stats.models = [...new Set(data.models_used || [])];
                    this.stats.events = Object.values(this.rawEvents).reduce((sum, events) => sum + events.length, 0);
                },

                updateTimestamp() {
                    const now = new Date();
                    this.lastUpdated = `Updated ${now.toLocaleTimeString()}`;
                },

                autoScrollToBottom() {
                    if (this.autoScroll) {
                        const container = document.getElementById('conversation-container');
                        if (container && container.lastElementChild) {
                            container.lastElementChild.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                        }
                    }
                },

                toggleAutoScroll() {
                    this.autoScroll = !this.autoScroll;
                    if (this.autoScroll) {
                        this.autoScrollToBottom();
                    }
                },

                connectionText() {
                    if (this.connection === 'connected') return 'Connected via SSE';
                    if (this.connection === 'reconnecting') return 'Reconnecting...';
                    if (!this.autoScroll) return 'Paused';
                    return 'Connecting...';
                },

                showError(msg) {
                    const container = document.getElementById('conversation-container');
                    container.innerHTML = `<div class="error-state">${escapeHtml(msg)}</div>`;
                },

                formatTime(iso) {
                    if (!iso) return '';
                    const date = new Date(iso);
                    return date.toLocaleTimeString();
                },

                snapshotExpandState() {
                    const state = { visible: [], expanded: [], open: [] };
                    document.querySelectorAll('.visible[id]').forEach(el => state.visible.push(el.id));
                    document.querySelectorAll('.expanded[id]').forEach(el => state.expanded.push(el.id));
                    document.querySelectorAll('.open[data-event-timeline]').forEach(el => {
                        state.open.push(el.getAttribute('data-event-timeline'));
                    });
                    document.querySelectorAll('.open[data-diff-toggle]').forEach(el => {
                        state.open.push('diff:' + el.getAttribute('data-diff-toggle'));
                    });
                    return state;
                },

                restoreExpandState(state) {
                    state.visible.forEach(id => {
                        const el = document.getElementById(id);
                        if (el) el.classList.add('visible');
                    });
                    state.expanded.forEach(id => {
                        const el = document.getElementById(id);
                        if (el) {
                            el.classList.add('expanded');
                            const btn = document.querySelector(`[data-expand-btn="${id}"]`);
                            if (btn) btn.textContent = 'Show less';
                        }
                    });
                    state.open.forEach(key => {
                        if (key.startsWith('diff:')) {
                            const diffId = key.slice(5);
                            const panel = document.getElementById(diffId);
                            const btn = document.querySelector(`[data-diff-toggle="${diffId}"]`);
                            if (panel) panel.classList.add('visible');
                            if (btn) btn.classList.add('open');
                        } else {
                            const btn = document.querySelector(`[data-event-timeline="${key}"]`);
                            if (btn) {
                                btn.classList.add('open');
                                const list = btn.parentElement?.querySelector('.event-list');
                                if (list) list.classList.add('visible');
                            }
                        }
                    });
                },

                renderTurns() {
                    const container = document.getElementById('conversation-container');

                    if (!this.turns || this.turns.length === 0) {
                        container.innerHTML = '<div class="empty-state">Waiting for conversation events...</div>';
                        return;
                    }

                    this.renderedCallIds.clear();
                    this.turnFingerprints = {};
                    for (const turn of this.turns) {
                        this.renderedCallIds.add(turn.call_id);
                        this.turnFingerprints[turn.call_id] = JSON.stringify(turn);
                    }

                    const savedState = this.snapshotExpandState();
                    container.innerHTML = this.turns.map((turn, i) => this.renderTurn(turn, i + 1)).join('');
                    this.restoreExpandState(savedState);
                },

                renderTurn(turn, number) {
                    const hasIntervention = turn.had_policy_intervention;
                    const classes = ['turn', `turn-${number - 1}`];
                    if (hasIntervention) classes.push('has-intervention');

                    const callId = escapeHtml(turn.call_id);
                    const requestHtml = (turn.request_messages || []).map((m, mi) => this.renderMessage(m, `${callId}-req-${mi}`)).join('');
                    const responseHtml = (turn.response_messages || []).map((m, mi) => this.renderMessage(m, `${callId}-res-${mi}`)).join('');

                    let diffHtml = '';
                    if (turn.request_was_modified || turn.response_was_modified) {
                        diffHtml = this.renderDiffSection(turn);
                    }

                    let annotationsHtml = '';
                    if (turn.annotations && turn.annotations.length > 0) {
                        annotationsHtml = `
                            <div class="messages">
                                ${turn.annotations.map(a => `
                                    <div class="policy-event">
                                        <span class="policy-event-label">${escapeHtml(a.policy_name)}:</span>
                                        ${escapeHtml(a.summary)}
                                    </div>
                                `).join('')}
                            </div>
                        `;
                    }

                    let eventTimelineHtml = '';
                    const events = this.rawEvents[callId] || [];
                    if (events.length > 0) {
                        const eventsHtml = events.map((evt, idx) => {
                            const eventKey = `${callId}-${idx}`;
                            return `
                                <div class="event-item">
                                    <span class="event-timestamp">${this.formatTime(evt.timestamp)}</span>
                                    <span class="event-type">${escapeHtml(evt.type)}</span>
                                    <button class="event-raw-toggle" data-toggle-raw="${eventKey}">Raw</button>
                                    <div class="event-raw-data" id="raw-${eventKey}">
                                        <pre>${escapeHtml(JSON.stringify(evt.data, null, 2))}</pre>
                                    </div>
                                </div>
                            `;
                        }).join('');

                        eventTimelineHtml = `
                            <div class="event-timeline">
                                <button class="event-timeline-toggle" data-event-timeline="${callId}">
                                    <span class="arrow">▶</span>
                                    Raw Events (${events.length})
                                </button>
                                <div class="event-list">
                                    ${eventsHtml}
                                </div>
                            </div>
                        `;
                    }

                    return `
                        <div class="${classes.join(' ')}" data-call-id="${callId}">
                            <div class="turn-header">
                                <div class="turn-label">
                                    <span class="turn-number">Turn ${number}</span>
                                    ${turn.model ? `<span class="turn-model">${escapeHtml(turn.model)}</span>` : ''}
                                </div>
                                ${hasIntervention ? '<span class="intervention-badge">Policy Modified</span>' : ''}
                            </div>
                            <div class="turn-body">
                                <div class="messages">
                                    ${requestHtml}
                                    ${responseHtml}
                                </div>
                                ${eventTimelineHtml}
                                ${diffHtml}
                                ${annotationsHtml}
                            </div>
                        </div>
                    `;
                },

                renderMessage(msg, stableId) {
                    const typeClass = msg.message_type.toLowerCase();
                    const typeLabel = {
                        'system': 'System', 'user': 'User', 'assistant': 'Assistant',
                        'tool_call': 'Tool Call', 'tool_result': 'Tool Result'
                    }[typeClass] || msg.message_type;

                    let headerExtra = '';
                    if (msg.message_type === 'tool_call' && msg.tool_name) {
                        headerExtra += `<span class="tool-name">${escapeHtml(msg.tool_name)}</span>`;
                    }
                    if (msg.tool_call_id) {
                        headerExtra += `<span class="tool-call-id">${escapeHtml(msg.tool_call_id)}</span>`;
                    }

                    const content = msg.content || '';
                    const shouldTruncate = content.length > 800;
                    const contentId = `c-${stableId}`;

                    let toolInputHtml = '';
                    if (msg.message_type === 'tool_call' && msg.tool_input) {
                        toolInputHtml = `
                            <div class="tool-input">
                                <pre>${escapeHtml(JSON.stringify(msg.tool_input, null, 2))}</pre>
                            </div>
                        `;
                    }

                    const expandBtn = shouldTruncate
                        ? `<button class="expand-btn" data-expand-btn="${contentId}">Show more</button>`
                        : '';

                    return `
                        <div class="message ${typeClass}">
                            <div class="message-header">
                                <span class="message-type">${typeLabel}</span>
                                ${headerExtra}
                            </div>
                            <div class="${shouldTruncate ? 'message-content truncated' : 'message-content'}" id="${contentId}">${escapeHtml(content)}</div>
                            ${expandBtn}
                            ${toolInputHtml}
                        </div>
                    `;
                },

                renderDiffSection(turn) {
                    const diffId = `diff-${escapeHtml(turn.call_id)}`;

                    let requestDiffHtml = '';
                    if (turn.request_was_modified && turn.original_request_messages) {
                        requestDiffHtml = this.renderDiffPanels(
                            'Request',
                            turn.original_request_messages,
                            turn.request_messages
                        );
                    }

                    let responseDiffHtml = '';
                    if (turn.response_was_modified && turn.original_response_messages) {
                        responseDiffHtml = this.renderDiffPanels(
                            'Response',
                            turn.original_response_messages,
                            turn.response_messages
                        );
                    }

                    return `
                        <div class="diff-section">
                            <button class="diff-toggle" data-diff-toggle="${diffId}">
                                <span class="arrow">▶</span>
                                View Policy Divergence
                            </button>
                            <div class="diff-panels" id="${diffId}">
                                ${requestDiffHtml}
                                ${responseDiffHtml}
                            </div>
                        </div>
                    `;
                },

                renderDiffPanels(label, originalMsgs, finalMsgs) {
                    const maxLen = Math.max(originalMsgs.length, finalMsgs.length);

                    let origContent = '';
                    let finalContent = '';

                    for (let i = 0; i < maxLen; i++) {
                        const origMsg = originalMsgs[i];
                        const finalMsg = finalMsgs[i];

                        const origText = origMsg ? (origMsg.content || '') : '';
                        const finalText = finalMsg ? (finalMsg.content || '') : '';
                        const changed = origText !== finalText;

                        const role = (origMsg && origMsg.message_type) || (finalMsg && finalMsg.message_type) || 'unknown';

                        origContent += `
                            <div class="diff-message ${changed ? 'changed' : ''}">
                                <div class="diff-message-role">${escapeHtml(role)}</div>
                                <div class="diff-message-content">${escapeHtml(origText || '(empty)')}</div>
                            </div>
                        `;

                        finalContent += `
                            <div class="diff-message ${changed ? 'changed' : ''}">
                                <div class="diff-message-role">${escapeHtml(role)}</div>
                                <div class="diff-message-content">${escapeHtml(finalText || '(empty)')}</div>
                            </div>
                        `;
                    }

                    return `
                        <div class="diff-panel">
                            <div class="diff-panel-header original">Original ${label}</div>
                            <div class="diff-panel-body">${origContent}</div>
                        </div>
                        <div class="diff-panel">
                            <div class="diff-panel-header final">Final ${label} (sent to LLM)</div>
                            <div class="diff-panel-body">${finalContent}</div>
                        </div>
                    `;
                }
            };
        }

        function escapeHtml(str) {
            if (str === null || str === undefined) return '';
            const div = document.createElement('div');
            div.textContent = String(str);
            return div.innerHTML;
        }

        document.addEventListener('alpine:init', () => {
            Alpine.data('conversationViewer', conversationViewer);
        });
    </script>
</body>
</html>
