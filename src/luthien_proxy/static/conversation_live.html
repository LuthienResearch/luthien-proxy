<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Conversation View</title>
    <link rel="stylesheet" href="/static/nav.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #09090b;
            color: #e4e4e7;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid #27272a;
        }

        .header-left { flex: 1; }

        .back-link {
            color: #71717a;
            text-decoration: none;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 12px;
            transition: color 0.2s;
        }

        .back-link:hover { color: #a1a1aa; }

        h1 {
            font-size: 22px;
            font-weight: 700;
            color: #fafafa;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: #4ade80;
            background: #4ade8015;
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid #4ade8030;
        }

        .live-dot {
            width: 7px;
            height: 7px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        .live-badge.paused {
            color: #71717a;
            background: #71717a15;
            border-color: #71717a30;
        }

        .live-badge.paused .live-dot {
            background: #71717a;
            animation: none;
        }

        .live-badge.reconnecting {
            color: #fbbf24;
            background: #fbbf2415;
            border-color: #fbbf2430;
        }

        .live-badge.reconnecting .live-dot {
            background: #fbbf24;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 #4ade8060; }
            50% { opacity: 0.6; box-shadow: 0 0 0 4px #4ade8000; }
        }

        .session-id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #52525b;
            margin-top: 6px;
            word-break: break-all;
        }

        .header-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .header-btn {
            padding: 7px 14px;
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 6px;
            color: #a1a1aa;
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .header-btn:hover {
            border-color: #3f3f46;
            color: #e4e4e7;
            background: #1c1c1f;
        }

        /* Stats bar */
        .stats-bar {
            display: flex;
            gap: 20px;
            padding: 14px 18px;
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 13px;
            color: #71717a;
            flex-wrap: wrap;
        }

        .stat-value {
            color: #e4e4e7;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .stat-value.warning { color: #fbbf24; }

        /* Connection indicator */
        .connection-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0 8px;
        }

        .connection-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4ade80;
        }

        .connection-dot.reconnecting {
            background: #fbbf24;
            animation: pulse 1s ease-in-out infinite;
        }

        .connection-dot.offline {
            background: #71717a;
        }

        .connection-text {
            font-size: 11px;
            color: #71717a;
        }

        /* Conversation timeline */
        .timeline {
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
        }

        /* Turn card */
        .turn {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 10px;
            overflow: hidden;
            transition: border-color 0.3s;
        }

        .turn.has-intervention {
            border-color: #fbbf2440;
        }

        .turn.new-turn {
            animation: slideIn 0.4s ease-out;
        }

        .turn.preflight {
            opacity: 0.5;
            border-color: #1e1e21;
        }

        .turn.preflight .turn-header {
            background: #151517;
            cursor: pointer;
        }

        .turn.preflight .preflight-badge {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #52525b;
            background: #52525b15;
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid #52525b30;
        }

        .turn.preflight .turn-body {
            display: none;
        }

        .turn.preflight.expanded .turn-body {
            display: block;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .turn-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: #1c1c1f;
            border-bottom: 1px solid #27272a;
            font-size: 12px;
            color: #71717a;
        }

        .turn-label {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .turn-number {
            font-weight: 700;
            color: #e4e4e7;
            font-size: 13px;
        }

        .turn-model {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            padding: 2px 8px;
            background: #09090b;
            border-radius: 4px;
            color: #71717a;
        }

        .intervention-badge {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #fbbf24;
            background: #fbbf2415;
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid #fbbf2430;
        }

        .turn-body {
            padding: 16px;
        }

        /* Messages */
        .messages {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            position: relative;
            border-left: 3px solid transparent;
        }

        .message.system  { background: #13132a; border-left-color: #6366f1; }
        .message.user    { background: #0f1f0f; border-left-color: #4ade80; }
        .message.assistant { background: #0f1420; border-left-color: #3b82f6; }
        .message.tool_call { background: #1a1708; border-left-color: #fbbf24; }
        .message.tool_result { background: #0a1a1a; border-left-color: #06b6d4; }
        .message.tool-error { background: #1a0a0a; border-left-color: #ef4444; }
        .message.tool-error .message-type { color: #f87171; }

        .error-badge {
            font-size: 10px;
            font-weight: 600;
            color: #ef4444;
            background: #ef444415;
            padding: 1px 6px;
            border-radius: 3px;
            border: 1px solid #ef444430;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }

        .message-type {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .message.system .message-type  { color: #818cf8; }
        .message.user .message-type    { color: #4ade80; }
        .message.assistant .message-type { color: #60a5fa; }
        .message.tool_call .message-type { color: #fbbf24; }
        .message.tool_result .message-type { color: #22d3ee; }

        .tool-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #fbbf24;
            background: #fbbf2410;
            padding: 1px 7px;
            border-radius: 3px;
        }

        .tool-call-id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: #52525b;
        }

        .message-content {
            font-size: 14px;
            color: #d4d4d8;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message-content.truncated {
            max-height: 280px;
            overflow: hidden;
            position: relative;
        }

        .message-content.truncated::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: linear-gradient(transparent, #18181b);
            pointer-events: none;
        }

        .message-content.truncated.expanded {
            max-height: none;
            overflow: visible;
        }

        .message-content.truncated.expanded::after {
            display: none;
        }

        .expand-btn {
            display: inline-block;
            margin-top: 6px;
            padding: 3px 10px;
            background: transparent;
            border: 1px solid #27272a;
            border-radius: 4px;
            color: #71717a;
            font-size: 11px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
        }

        .expand-btn:hover {
            border-color: #4ade80;
            color: #4ade80;
        }

        .tool-input {
            padding: 10px 12px;
            background: #09090b;
            border-radius: 6px;
            border: 1px solid #27272a;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #a1a1aa;
            overflow-x: auto;
        }

        .tool-input pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* Tool result: code-style block */
        .tool-result-content {
            background: #09090b;
            border-radius: 6px;
            border: 1px solid #27272a;
            padding: 10px 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #a1a1aa;
            overflow-x: auto;
        }

        .tool-result-content pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .tool-result-content.truncated {
            max-height: 280px;
            overflow: hidden;
            position: relative;
        }

        .tool-result-content.truncated::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: linear-gradient(transparent, #09090b);
            pointer-events: none;
        }

        .tool-result-content.truncated.expanded {
            max-height: none;
            overflow: visible;
        }

        .tool-result-content.truncated.expanded::after {
            display: none;
        }

        /* Visual grouping: tool calls and their results */
        .message.tool_call + .message.tool_result,
        .message.tool_result + .message.tool_result {
            margin-top: 4px;
            border-top-left-radius: 2px;
            border-top-right-radius: 2px;
        }

        .message.tool_call {
            margin-bottom: 0;
            border-bottom-left-radius: 2px;
            border-bottom-right-radius: 2px;
        }

        /* Collapsible tagged sections */
        .tagged-section {
            margin: 6px 0;
            border: 1px solid #27272a;
            border-radius: 6px;
            overflow: hidden;
        }

        .tagged-section summary {
            padding: 6px 10px;
            background: #1c1c1f;
            font-size: 11px;
            font-weight: 600;
            color: #71717a;
            cursor: pointer;
            user-select: none;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tagged-section summary::-webkit-details-marker { display: none; }

        .tagged-section summary::before {
            content: '▶';
            font-size: 8px;
            transition: transform 0.15s;
        }

        .tagged-section[open] summary::before {
            transform: rotate(90deg);
        }

        .tagged-section .tagged-content {
            padding: 8px 10px;
            font-size: 12px;
            color: #a1a1aa;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 300px;
            overflow-y: auto;
            background: #09090b;
            border-top: 1px solid #27272a;
        }

        .tag-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 3px;
            background: #27272a;
            color: #a1a1aa;
        }

        .tagged-section.system-reminder .tag-label { background: #6366f115; color: #818cf8; }
        .tagged-section.policy-context .tag-label { background: #fbbf2415; color: #fbbf24; }
        .tagged-section.bash-output .tag-label { background: #4ade8015; color: #4ade80; }

        /* Event timeline */
        .event-timeline {
            margin-top: 16px;
            border-top: 1px solid #27272a;
            padding-top: 12px;
        }

        .event-timeline-toggle {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: #3f3f4615;
            border: 1px solid #3f3f4630;
            border-radius: 6px;
            color: #a1a1aa;
            font-size: 11px;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 8px;
        }

        .event-timeline-toggle:hover {
            background: #3f3f4625;
            border-color: #3f3f4650;
        }

        .event-timeline-toggle .arrow {
            transition: transform 0.2s;
            font-size: 9px;
        }

        .event-timeline-toggle.open .arrow {
            transform: rotate(90deg);
        }

        .event-list {
            display: none;
            max-height: 400px;
            overflow-y: auto;
            border-left: 2px solid #27272a;
            padding-left: 12px;
            margin-left: 6px;
        }

        .event-list.visible {
            display: block;
        }

        .event-item {
            font-size: 12px;
            color: #a1a1aa;
            padding: 8px 0;
            border-bottom: 1px solid #27272a;
            position: relative;
            padding-left: 12px;
        }

        .event-item::before {
            content: '';
            position: absolute;
            left: -8px;
            top: 12px;
            width: 6px;
            height: 6px;
            background: #3f3f46;
            border-radius: 50%;
        }

        .event-item:last-child {
            border-bottom: none;
        }

        .event-timestamp {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: #52525b;
            margin-right: 8px;
        }

        .event-type {
            font-weight: 600;
            color: #e4e4e7;
        }

        .event-raw-toggle {
            display: inline-block;
            margin-left: 8px;
            padding: 2px 6px;
            background: transparent;
            border: 1px solid #27272a;
            border-radius: 3px;
            color: #52525b;
            font-size: 9px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
        }

        .event-raw-toggle:hover {
            border-color: #3f3f46;
            color: #71717a;
        }

        .event-raw-data {
            display: none;
            margin-top: 6px;
            padding: 8px 10px;
            background: #09090b;
            border: 1px solid #27272a;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #71717a;
            overflow-x: auto;
            max-height: 200px;
            overflow-y: auto;
        }

        .event-raw-data.visible {
            display: block;
        }

        /* Policy event cards */
        .policy-event {
            margin-top: 12px;
            padding: 10px 12px;
            background: #fbbf2408;
            border: 1px solid #fbbf2420;
            border-left: 3px solid #fbbf24;
            border-radius: 6px;
            font-size: 12px;
            color: #fbbf24;
        }

        .policy-event-label {
            font-weight: 700;
            margin-right: 4px;
        }

        /* Diff view */
        .diff-section {
            margin-top: 16px;
            border-top: 1px solid #27272a;
            padding-top: 16px;
        }

        .diff-toggle {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: #fbbf2410;
            border: 1px solid #fbbf2430;
            border-radius: 6px;
            color: #fbbf24;
            font-size: 12px;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 12px;
        }

        .diff-toggle:hover {
            background: #fbbf2420;
            border-color: #fbbf2450;
        }

        .diff-toggle .arrow {
            transition: transform 0.2s;
            font-size: 10px;
        }

        .diff-toggle.open .arrow {
            transform: rotate(90deg);
        }

        .diff-panels {
            display: none;
        }

        .diff-panels.visible {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .diff-panel {
            background: #09090b;
            border: 1px solid #27272a;
            border-radius: 8px;
            overflow: hidden;
        }

        .diff-panel-header {
            padding: 8px 14px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #27272a;
        }

        .diff-panel-header.original {
            color: #f87171;
            background: #f8717108;
        }

        .diff-panel-header.final {
            color: #4ade80;
            background: #4ade8008;
        }

        .diff-panel-body {
            padding: 12px;
            max-height: 500px;
            overflow-y: auto;
        }

        .diff-message {
            padding: 8px 10px;
            margin-bottom: 8px;
            border-radius: 4px;
            background: #18181b;
            border-left: 2px solid #3f3f46;
        }

        .diff-message.changed {
            border-left-color: #fbbf24;
            background: #fbbf2408;
        }

        .diff-message-role {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #52525b;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .diff-message-content {
            font-size: 13px;
            color: #a1a1aa;
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* States */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #52525b;
            font-size: 14px;
        }

        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: #71717a;
            font-size: 14px;
        }

        .loading-state .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #27272a;
            border-top-color: #4ade80;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-state {
            text-align: center;
            padding: 40px;
            color: #f87171;
            background: #f8717108;
            border: 1px solid #f8717120;
            border-radius: 8px;
            font-size: 14px;
        }

        /* Last-updated indicator */
        .update-indicator {
            font-size: 11px;
            color: #52525b;
            text-align: right;
            margin-top: 12px;
            font-variant-numeric: tabular-nums;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .diff-panels.visible {
                grid-template-columns: 1fr;
            }
            .stats-bar {
                gap: 12px;
            }
        }
    </style>
</head>
<body>
    <nav x-data="luthienNav" class="luthien-nav">
        <a href="/" class="nav-brand">Luthien</a>
        <div class="nav-right">
            <template x-for="link in links" :key="link.href">
                <a :href="link.href" class="nav-link" :class="{ active: isActive(link.href) }" x-text="link.label"></a>
            </template>
            <template x-if="isAuthenticated()">
                <a href="/auth/logout" class="nav-signout">Sign Out</a>
            </template>
        </div>
    </nav>

    <div class="container" x-data="conversationViewer()">
        <header>
            <div class="header-left">
                <a href="/history" class="back-link">← Sessions</a>
                <h1>
                    Conversation
                    <span class="live-badge" :class="{ paused: !autoScroll, reconnecting: connection === 'reconnecting' }">
                        <span class="live-dot"></span>
                        <span x-text="autoScroll && connection === 'connected' ? 'Live' : (autoScroll ? 'Connecting...' : 'Paused')"></span>
                    </span>
                </h1>
                <p class="session-id" x-text="conversationId || 'Loading...'"></p>
            </div>
            <div class="header-right">
                <button @click="toggleAutoScroll()" class="header-btn" x-text="autoScroll ? 'Pause' : 'Resume'"></button>
                <a :href="`/api/history/sessions/${encodeURIComponent(conversationId)}/export/jsonl`" class="header-btn">Export JSONL</a>
                <a :href="`/api/history/sessions/${encodeURIComponent(conversationId)}/export`" class="header-btn">Export MD</a>
            </div>
        </header>

        <div class="stats-bar">
            <span>Turns: <span class="stat-value" x-text="stats.turns"></span></span>
            <span>Policy interventions: <span class="stat-value" :class="{ warning: stats.interventions > 0 }" x-text="stats.interventions"></span></span>
            <span>Models: <span class="stat-value" x-text="stats.models.join(', ') || 'None'"></span></span>
            <span>Events: <span class="stat-value" x-text="stats.events"></span></span>
            <div class="connection-status">
                <span class="connection-dot" :class="{ reconnecting: connection === 'reconnecting', offline: connection === 'paused' }"></span>
                <span class="connection-text" x-text="connectionText()"></span>
            </div>
        </div>

        <div id="conversation-container" class="timeline">
            <div class="loading-state">
                <div class="spinner"></div>
                <div>Loading conversation...</div>
            </div>
        </div>
